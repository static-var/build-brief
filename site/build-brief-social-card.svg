<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient: deep near-black with subtle warmth -->
    <radialGradient id="bg" cx="0.35" cy="0.4" r="0.9">
      <stop offset="0%" stop-color="#1a1525"/>
      <stop offset="60%" stop-color="#0e0b14"/>
      <stop offset="100%" stop-color="#08060c"/>
    </radialGradient>

    <!-- Violet accent gradient -->
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <!-- Glow for the accent line -->
    <filter id="glow" x="-20%" y="-200%" width="140%" height="500%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Soft glow behind title -->
    <filter id="titleGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="30" result="blur"/>
    </filter>

    <!-- Noise lines blur (makes them feel like fading output) -->
    <filter id="fadeNoise" x="0" y="0" width="100%" height="100%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>

    <!-- Mask for noise lines fading out toward the right -->
    <linearGradient id="noiseFade" x1="0" y1="0" x2="0.7" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <mask id="noiseMask">
      <rect x="0" y="0" width="1200" height="630" fill="url(#noiseFade)"/>
    </mask>

    <!-- Subtle dot pattern -->
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.5" fill="#a78bfa" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- === BACKGROUND === -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- === NOISE LINES (left side, fading) — representing verbose Gradle output === -->
  <g mask="url(#noiseMask)" filter="url(#fadeNoise)">
    <text font-family="'Courier New', monospace" font-size="11" fill="#6e5a8a" opacity="0.35">
      <tspan x="60" y="105">:app:compileDebugJavaWithJavac</tspan>
      <tspan x="60" dy="16">Note: Some input files use unchecked operations</tspan>
      <tspan x="60" dy="16">:app:mergeDebugResources FAILED</tspan>
      <tspan x="60" dy="16">AAPT2 error: check logs for details</tspan>
      <tspan x="60" dy="16">w: file:///src/main/kotlin/App.kt: (12, 4)</tspan>
      <tspan x="60" dy="16">:lib:processResources NO-SOURCE</tspan>
      <tspan x="60" dy="16">&gt; Task :app:kaptGenerateStubsDebug</tspan>
      <tspan x="60" dy="16">Deprecated Gradle features were used</tspan>
      <tspan x="60" dy="16">:core:compileKotlin UP-TO-DATE</tspan>
      <tspan x="60" dy="16">Download https://repo.maven.org/artifact</tspan>
    </text>
    <text font-family="'Courier New', monospace" font-size="11" fill="#5a4878" opacity="0.22">
      <tspan x="60" y="275">:app:transformClassesWithDex</tspan>
      <tspan x="60" dy="16">Configuration ':app:debugCompile' was resolved</tspan>
      <tspan x="60" dy="16">w: Runtime JAR files in classpath have</tspan>
      <tspan x="60" dy="16">:app:packageDebugResources</tspan>
      <tspan x="60" dy="16">&gt; Configure project :lib</tspan>
      <tspan x="60" dy="16">:app:mergeDebugAssets</tspan>
    </text>
    <text font-family="'Courier New', monospace" font-size="11" fill="#4a3a68" opacity="0.15">
      <tspan x="60" y="385">:app:checkDebugDuplicateClasses</tspan>
      <tspan x="60" dy="16">Execution optimizations have been disabled</tspan>
      <tspan x="60" dy="16">:core:javaPreCompileDebug UP-TO-DATE</tspan>
      <tspan x="60" dy="16">&gt; Task :app:mergeExtDexDebug</tspan>
      <tspan x="60" dy="16">:app:stripDebugDebugSymbols NO-SOURCE</tspan>
      <tspan x="60" dy="16">:app:validateSigningDebug</tspan>
      <tspan x="60" dy="16">BUILD SUCCESSFUL in 2m 14s</tspan>
      <tspan x="60" dy="16">87 actionable tasks: 23 executed</tspan>
    </text>
  </g>

  <!-- === ACCENT LINE — the "cut" === -->
  <g filter="url(#glow)">
    <line x1="80" y1="340" x2="1120" y2="340" stroke="url(#violet)" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  </g>
  <!-- Secondary faint line for depth -->
  <line x1="80" y1="340" x2="1120" y2="340" stroke="#a78bfa" stroke-width="0.3" opacity="0.3"/>

  <!-- === TITLE GLOW (behind text) === -->
  <ellipse cx="600" cy="285" rx="280" ry="60" fill="#7c3aed" opacity="0.06" filter="url(#titleGlow)"/>

  <!-- === PRODUCT NAME === -->
  <text x="600" y="290" text-anchor="middle" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace" font-size="72" font-weight="700" fill="#f0ecf6" letter-spacing="-1">
    build-brief
  </text>

  <!-- === TAGLINE (below the line) === -->
  <text x="600" y="400" text-anchor="middle" font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="22" fill="#b4a0d0" letter-spacing="0.5" opacity="0.9">
    Cut the noise from every Gradle build.
  </text>

  <!-- === SUMMARY BLOCK — the "signal" side (right, below accent line) === -->
  <g opacity="0.75">
    <!-- Clean summary box -->
    <rect x="660" y="440" width="420" height="120" rx="8" fill="#13101a" stroke="#7c3aed" stroke-width="0.8" opacity="0.7"/>

    <!-- Summary content — crisp, brief -->
    <text font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace" font-size="12" fill="#c4b5fd">
      <tspan x="684" y="468" fill="#7c3aed">$</tspan>
      <tspan fill="#d4cce8"> build-brief ./gradlew assembleDebug</tspan>
    </text>
    <text font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace" font-size="11.5">
      <tspan x="684" y="492" fill="#4ade80">✓</tspan>
      <tspan fill="#a3a0b0"> BUILD SUCCESSFUL</tspan>
      <tspan fill="#6b6880">  2m 14s  23/87 tasks</tspan>
    </text>
    <text font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace" font-size="11.5">
      <tspan x="684" y="512" fill="#a78bfa">↓</tspan>
      <tspan fill="#a3a0b0"> 1,247 lines → 4 lines</tspan>
      <tspan fill="#6b6880">  saved 98.7% tokens</tspan>
    </text>
    <text font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace" font-size="11.5">
      <tspan x="684" y="532" fill="#fbbf24">⚠</tspan>
      <tspan fill="#a3a0b0"> 2 warnings</tspan>
      <tspan fill="#6b6880">  0 errors  artifacts: app-debug.apk</tspan>
    </text>
  </g>

  <!-- === SITE URL (bottom right, subtle) === -->
  <text x="1120" y="600" text-anchor="end" font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, sans-serif" font-size="14" fill="#6b6880" letter-spacing="0.8" opacity="0.6">
    bb.staticvar.dev
  </text>

  <!-- === FOR HUMANS &amp; AI — tiny descriptor (bottom left) === -->
  <text x="80" y="600" font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, sans-serif" font-size="13" fill="#6b6880" letter-spacing="1.5" opacity="0.5" text-transform="uppercase">
    FOR HUMANS &amp; AI AGENTS
  </text>
</svg>
