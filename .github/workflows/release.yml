name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver part to increment
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: Optional explicit version, for example 0.2.0 or v0.2.0
        required: false
        type: string
      # Dry runs intentionally retain GitHub-hosted validation evidence and cache state.
      publish:
        description: Publish release mutations. When false, validation may upload artifacts and use action caches, but makes no repository commit/tag/push, GitHub Release mutation, or Homebrew mutation.
        required: true
        default: false
        type: boolean
      publish_homebrew:
        description: Publish the generated formula to Homebrew only when publish is also true
        required: true
        default: false
        type: boolean

# GitHub Actions permissions cannot vary by workflow input. This remains write-capable
# for publish runs. With publish=false, the invariant is no repository commit/tag/push,
# GitHub Release mutation, or Homebrew mutation; artifact uploads and action caches are
# intentional validation evidence and optimization, not release mutations.
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Sync branch state
        env:
          RELEASE_REF_NAME: ${{ github.ref_name }}
        run: |
          git fetch origin "$RELEASE_REF_NAME" --tags
          git checkout "$RELEASE_REF_NAME"
          git reset --hard "origin/$RELEASE_REF_NAME"

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.x'

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Preflight Homebrew token
        if: inputs.publish && inputs.publish_homebrew
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "HOMEBREW_TAP_TOKEN is not set" >&2
            exit 1
          fi

      - name: Prepare release metadata
        id: prepare
        env:
          RELEASE_BUMP: ${{ inputs.bump }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          chmod +x scripts/prepare-release.sh scripts/build-artifacts.sh scripts/generate-homebrew-formula.sh scripts/validate-homebrew-formula.sh scripts/publish-homebrew-tap.sh scripts/append-generated-release-notes.sh
          scripts/prepare-release.sh \
            --bump "$RELEASE_BUMP" \
            --version "$RELEASE_VERSION" \
            --output-dir .release

      - name: Run test suite
        run: go test ./...

      - name: Build release artifacts
        env:
          RELEASE_VERSION: ${{ steps.prepare.outputs.version }}
        run: scripts/build-artifacts.sh --version "$RELEASE_VERSION" --output-dir dist

      - name: Generate Homebrew formula
        env:
          RELEASE_REPOSITORY: ${{ github.repository }}
          RELEASE_VERSION: ${{ steps.prepare.outputs.version }}
        run: |
          scripts/generate-homebrew-formula.sh \
            --version "$RELEASE_VERSION" \
            --repo "$RELEASE_REPOSITORY" \
            --artifact-dir dist \
            --output .release/build-brief.rb

      - name: Validate Homebrew formula
        env:
          RELEASE_VERSION: ${{ steps.prepare.outputs.version }}
        run: |
          scripts/validate-homebrew-formula.sh \
            --version "$RELEASE_VERSION" \
            --artifact-dir dist \
            --formula .release/build-brief.rb

      # Every release mutation below is explicitly gated; do not gate validation evidence or caches.
      - name: Commit version bump and changelog
        if: inputs.publish && steps.prepare.outputs.needs_commit == 'true'
        env:
          RELEASE_TAG: ${{ steps.prepare.outputs.tag }}
        run: |
          git add internal/app/version.go CHANGELOG.md
          git commit -m "chore(release): $RELEASE_TAG"

      - name: Create release tag
        if: inputs.publish && steps.prepare.outputs.tag_exists != 'true'
        env:
          RELEASE_TAG: ${{ steps.prepare.outputs.tag }}
        run: |
          git tag "$RELEASE_TAG"

      - name: Push release commit
        if: inputs.publish && steps.prepare.outputs.needs_commit == 'true'
        env:
          RELEASE_REF_NAME: ${{ github.ref_name }}
        run: git push origin "HEAD:$RELEASE_REF_NAME"

      - name: Push release tag
        if: inputs.publish && steps.prepare.outputs.tag_exists != 'true'
        env:
          RELEASE_TAG: ${{ steps.prepare.outputs.tag }}
        run: git push origin "$RELEASE_TAG"

      - name: Generate GitHub changelog notes
        id: github-notes
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES_FILE: ${{ steps.prepare.outputs.notes_file }}
          RELEASE_REPOSITORY: ${{ github.repository }}
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ steps.prepare.outputs.tag }}
        run: |
          generated_notes_file=".release/github-generated-notes.md"
          combined_notes_file=".release/release-notes-with-github-changelog.md"

          gh api "repos/$RELEASE_REPOSITORY/releases/generate-notes" \
            -f tag_name="$RELEASE_TAG" \
            -f target_commitish="$RELEASE_SHA" \
            -q '.body' > "$generated_notes_file"

          scripts/append-generated-release-notes.sh \
            --notes-file "$RELEASE_NOTES_FILE" \
            --generated-file "$generated_notes_file" \
            --output "$combined_notes_file"

          echo "notes_file=$combined_notes_file" >> "$GITHUB_OUTPUT"

      # Keep this ungated: dry runs upload validation evidence by design.
      - name: Upload workflow artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: build-brief-${{ steps.prepare.outputs.tag }}
          path: |
            dist/*
            .release/build-brief.rb
            .release/*.md
          if-no-files-found: error

      - name: Publish GitHub release
        if: inputs.publish
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES_FILE: ${{ steps.github-notes.outputs.notes_file }}
          RELEASE_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.prepare.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$RELEASE_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --repo "$RELEASE_REPOSITORY" --clobber
            gh release edit "$RELEASE_TAG" \
              --repo "$RELEASE_REPOSITORY" \
              --title "build-brief $RELEASE_TAG" \
              --notes-file "$RELEASE_NOTES_FILE"
          else
            gh release create "$RELEASE_TAG" \
              dist/* \
              --repo "$RELEASE_REPOSITORY" \
              --title "build-brief $RELEASE_TAG" \
              --notes-file "$RELEASE_NOTES_FILE"
          fi

      - name: Publish Homebrew tap
        if: inputs.publish && inputs.publish_homebrew
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
          HOMEBREW_TAP_BRANCH: ${{ vars.HOMEBREW_TAP_BRANCH }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          RELEASE_VERSION: ${{ steps.prepare.outputs.version }}
        run: |
          tap_repo="${HOMEBREW_TAP_REPOSITORY:-${GITHUB_REPOSITORY_OWNER}/homebrew-tap}"
          tap_branch="${HOMEBREW_TAP_BRANCH:-main}"
          scripts/publish-homebrew-tap.sh \
            --tap-repo "$tap_repo" \
            --branch "$tap_branch" \
            --formula-file .release/build-brief.rb \
            --version "$RELEASE_VERSION"
